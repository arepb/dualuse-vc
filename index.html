    const CACHE_KEY = "dualuse_news_cache_v5";
    const CACHE_TTL = 15 * 60 * 1000; // 15 minutes

    function NewsSection({ compact }) {
      const [articles, setArticles] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [cachedAt, setCachedAt] = React.useState(null);
      const [refreshing, setRefreshing] = React.useState(false);

      React.useEffect(() => {
        // 1. Show cached articles instantly if available
        try {
          const raw = localStorage.getItem(CACHE_KEY);
          if (raw) {
            const { articles: cached, ts } = JSON.parse(raw);
            if (cached?.length) {
              // Rehydrate date strings back to Date objects
              const hydrated = cached.map(a => ({ ...a, date: new Date(a.date) }));
              setArticles(hydrated);
              setLoading(false);
              setCachedAt(new Date(ts));
              // Skip fresh fetch if cache is < TTL
              if (Date.now() - ts < CACHE_TTL) return;
              setRefreshing(true);
            }
          }
        } catch(e) {}

        const parseXML = (xmlStr) => {
          if (!xmlStr) return [];
          if (xmlStr.startsWith("data:")) {
            try {
              const bytes = Uint8Array.from(atob(xmlStr.split(",")[1]), c => c.charCodeAt(0));
              xmlStr = new TextDecoder("utf-8").decode(bytes);
            } catch(e) { return []; }
          }
          const xml = new DOMParser().parseFromString(xmlStr, "text/xml");
          return [...xml.querySelectorAll("item")].slice(0, 6).map(item => {
            const getText = (tag) => item.querySelector(tag)?.textContent?.trim() || "";
            const link = getText("link") || getText("guid");
            const title = getText("title").replace(/<!\[CDATA\[|\]\]>/g, "").trim();
            const pubDate = getText("pubDate");
            return { title, link, date: pubDate ? new Date(pubDate) : new Date(0) };
          }).filter(a => a.title && a.link);
        };

        const tryProxy = async (url, parseRes, timeoutMs) => {
          const controller = new AbortController();
          const timer = setTimeout(() => controller.abort(), timeoutMs);
          try {
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timer);
            if (!res.ok) return null;
            return await parseRes(res);
          } catch(e) { clearTimeout(timer); return null; }
        };

        const fetchFeed = async (feed) => {
          const enc = encodeURIComponent(feed.url);
          const raw = await tryProxy(
            "https://api.codetabs.com/v1/proxy/?quest=" + enc,
            async (res) => res.text(),
            8000
          );
          if (!raw) return [];
          return parseXML(raw).map(a => ({ ...a, source: feed.name }));
        };

        const MAX_AGE = 60 * 24 * 60 * 60 * 1000; // 60 days
        const MAX_PER_SOURCE = 3; // cap per source so no single feed dominates
        Promise.all(RSS_FEEDS.map(fetchFeed)).then(results => {
          // Group by source, sorted newest-first, capped at MAX_PER_SOURCE each
          const bySource = {};
          results.flat()
            .filter(a => a.title && a.link)
            .filter(a => !a.date || a.date.getTime() === 0 || (Date.now() - a.date.getTime()) < MAX_AGE)
            .sort((a, b) => b.date - a.date)
            .forEach(a => {
              if (!bySource[a.source]) bySource[a.source] = [];
              if (bySource[a.source].length < MAX_PER_SOURCE) bySource[a.source].push(a);
            });
          // Round-robin interleave across sources
          const queues = Object.values(bySource);
          const interleaved = [];
          while (queues.some(q => q.length)) {
            queues.forEach(q => { if (q.length) interleaved.push(q.shift()); });
          }
          let all = interleaved.slice(0, 16);
          // Trim to nearest multiple of 4 so the grid never has an incomplete last row.
          const colCount = 4;
          if (all.length >= colCount) {
            all = all.slice(0, Math.floor(all.length / colCount) * colCount);
          }
          if (all.length > 0) {
            const now = Date.now();
            try {
              localStorage.setItem(CACHE_KEY, JSON.stringify({ articles: all, ts: now }));
            } catch(e) {}
            setArticles(all);
            setCachedAt(new Date(now));
          }
          setLoading(false);
          setRefreshing(false);
        });
      }, []);

      const fmt = (d) => {
        const h = Math.floor((Date.now() - d) / 3600000);
        const days = Math.floor(h / 24);
        if (h < 1) return "JUST NOW";
        if (h < 24) return h + "H AGO";
        if (days < 7) return days + "D AGO";
        return d.toLocaleDateString("en-US", { month: "short", day: "numeric" }).toUpperCase();
      };

      return React.createElement("div", { style: compact ? {} : { marginBottom: 72 } },

  <!-- Rotating halftone globe -->
  <script>
    (function() {
      const TILT = 23.5 * Math.PI / 180;
      const cosT = Math.cos(TILT), sinT = Math.sin(TILT);
      const ll = Math.sqrt(0.5*0.5 + 0.55*0.55 + 0.67*0.67);
      const LX = -0.5/ll, LY = -0.55/ll, LZ = 0.67/ll;
      const LAT = 28, BASE_LON = 54;

      function drawGlobe(canvas, angle) {
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const cx = W/2, cy = H/2;
        // R and dot size scale with canvas size
        const R = Math.min(W, H) * 0.43;
        const BASE_DOT = R * 0.033;

        ctx.fillStyle = '#d8d8d8';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#000';

        const dots = [];
        for (let li = 0; li <= LAT; li++) {
          const lat = (li/LAT)*Math.PI - Math.PI/2;
          const cosL = Math.cos(lat), sinL = Math.sin(lat);
          const lons = Math.max(4, Math.round(BASE_LON * Math.abs(cosL)));
          for (let lo = 0; lo < lons; lo++) {
            const lon = (lo/lons)*2*Math.PI + angle;
            let x = cosL*Math.cos(lon), y = sinL, z = cosL*Math.sin(lon);
            const xt = x*cosT - y*sinT, yt = x*sinT + y*cosT;
            x = xt; y = yt;
            if (z < 0) continue;
            const diff = Math.max(0, x*LX + y*LY + z*LZ);
            const bright = diff*0.88 + 0.10;
            const edge = Math.pow(Math.max(0, z), 0.35);
            const dr = BASE_DOT * edge * (0.28 + bright*0.72);
            if (dr > 0.15) dots.push({ z, px: cx+x*R, py: cy-y*R, dr });
          }
        }
        dots.sort((a,b) => a.z - b.z);
        dots.forEach(d => {
          ctx.beginPath();
          ctx.arc(d.px, d.py, d.dr, 0, Math.PI*2);
          ctx.fill();
        });
      }

      function initGlobe() {
        const canvas = document.getElementById('du-globe');
        if (!canvas) return false;
        // Size canvas appropriately for desktop vs mobile
        const isMobile = window.innerWidth <= 768;
        const size = isMobile ? 80 : 140;
        canvas.width = size;
        canvas.height = size;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
        return true;
      }

      let angle = 0;
      function tick() {
        const canvas = document.getElementById('du-globe');
        drawGlobe(canvas, angle);
        angle -= 0.003;
        requestAnimationFrame(tick);
      }
      // Wait for React to mount the canvas, then size and start
      const wait = setInterval(() => {
        if (initGlobe()) { clearInterval(wait); tick(); }
      }, 100);
    })();
  </script>
